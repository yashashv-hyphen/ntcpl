version: "3.9"

# network_mode: host bypasses CNI entirely, fixing Podman/WSL2 CNI plugin
# version errors. Both services share the host network stack directly.
# Ports 7860 (web UI) and 7861 (image service) are accessible on localhost.

services:

  image-service:
    build: .
    command: bash -c "fuser -k 7861/tcp 2>/dev/null || true; sleep 1; python image_service.py"
    network_mode: host
    env_file:
      - .env
    environment:
      IMAGE_SERVICE_PORT: "7861"
      AI_GENERATED_IMAGE_DIR: /app/generated_images
      AMAZON_IMAGE_PROJECT_DIR: /app/generated_images
    volumes:
      - ./generated_images:/app/generated_images
    restart: unless-stopped

  excel-service:
    build: .
    command: bash -c "fuser -k 7860/tcp 2>/dev/null || true; sleep 1; python amazon_template_autofill_web.py --host 0.0.0.0 --port 7860"
    network_mode: host
    env_file:
      - .env
    environment:
      IMAGE_SERVICE_URL: http://localhost:7861
    volumes:
      - ./generated_images:/app/generated_images
      - uploaded_images:/app/uploaded_product_images
      - uploaded_templates:/app/uploaded_excel_templates
      - uploaded_catalogs:/app/uploaded_catalogs
    depends_on:
      - image-service
    restart: unless-stopped

volumes:
  uploaded_images:
  uploaded_templates:
  uploaded_catalogs:
